name: Release New Version

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v2.1.1)"
        required: false
        default: "v2.1.1"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      clean: ${{ steps.ver.outputs.clean }}
      filever: ${{ steps.ver.outputs.filever }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}") {
            $raw = "${{ github.ref_name }}"
          } else {
            $raw = "${{ inputs.version }}"
          }

          if ([string]::IsNullOrWhiteSpace($raw)) {
            throw "Version tag is empty."
          }

          $raw = $raw.Trim()
          $clean = $raw -replace '^v+',''   # 去掉所有前导 v
          if ([string]::IsNullOrWhiteSpace($clean)) {
            throw "Invalid version tag: $raw"
          }

          $tag = "v$clean"                  # 统一成单个 v 前缀，避免 vv2.1.1

          $parts = $clean.Split('.')
          while ($parts.Length -lt 4) { $parts += '0' }
          $filever = ($parts[0..3] -join '.')   # 2.1.1.0

          "tag=$tag"         | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "clean=$clean"     | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "filever=$filever" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          Write-Host "tag=$tag"
          Write-Host "clean=$clean"
          Write-Host "filever=$filever"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python --version

      - name: Run Compile (Nuitka)
        shell: pwsh
        run: |
          python -m nuitka --windows-file-version=${{ steps.ver.outputs.filever }} --show-progress --mingw64 --assume-yes-for-downloads --output-dir=out main/Boss-Key.py

      - name: Package outputs
        shell: pwsh
        run: |
          $tag = "${{ steps.ver.outputs.tag }}"
          $newExeName = "Boss-Key-$tag-onefile.exe"

          if (!(Test-Path "out/Boss-Key.exe")) { throw "Missing out/Boss-Key.exe" }

          Rename-Item "out/Boss-Key.exe" $newExeName
          Copy-Item "out/$newExeName" "out/Boss-Key.exe" -Force  # 给 Inno 脚本保留固定文件名

          if (Test-Path "out/Boss-Key.dist") {
            Compress-Archive -Path "out/Boss-Key.dist\*" -DestinationPath "out/Boss-Key-$tag-multifile.zip" -Force
          } else {
            throw "Missing out/Boss-Key.dist"
          }

          Get-ChildItem out -Recurse

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.tag }}-Build
          path: |
            out/Boss-Key.exe
            out/Boss-Key-${{ steps.ver.outputs.tag }}-onefile.exe
            out/Boss-Key-${{ steps.ver.outputs.tag }}-multifile.zip
            out/Boss-Key.dist/**

      - name: Release main assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Boss Key ${{ steps.ver.outputs.tag }}
          files: |
            out/Boss-Key-${{ steps.ver.outputs.tag }}-onefile.exe
            out/Boss-Key-${{ steps.ver.outputs.tag }}-multifile.zip
          generate_release_notes: true
          make_latest: true
          draft: false
          prerelease: false

  compile-to-installer:
    runs-on: windows-latest
    needs: build-and-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-and-release.outputs.tag }}-Build
          path: ./artifact

      - name: Prepare installer input files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ".github/inno-script/software" | Out-Null

          $exe = Get-ChildItem -Path "./artifact" -Recurse -Filter "Boss-Key.exe" | Select-Object -First 1
          if (-not $exe) { throw "Boss-Key.exe not found in artifact." }

          Copy-Item $exe.FullName ".github/inno-script/software/Boss-Key.exe" -Force
          Write-Host "Prepared .github/inno-script/software/Boss-Key.exe"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Find ISCC path
        id: iscc
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            $iscc = (Get-Command ISCC.exe -ErrorAction SilentlyContinue).Source
          }
          if ([string]::IsNullOrWhiteSpace($iscc)) {
            throw "ISCC.exe not found"
          }
          "path=$iscc" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "ISCC: $iscc"

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "${{ steps.iscc.outputs.path }}"
          if ([string]::IsNullOrWhiteSpace($iscc)) { throw "ISCC output is empty" }

          $script = ".\.github\inno-script\Boss-Key.iss"
          if (!(Test-Path $script)) { throw "ISS script not found: $script" }

          $outDir = ".\installer-out"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $tag = "${{ needs.build-and-release.outputs.tag }}"
          & $iscc "/DMyAppVersion=$tag" "/O$outDir" $script

          Get-ChildItem $outDir -Recurse

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.build-and-release.outputs.tag }}-Installer
          path: installer-out/*.exe

      - name: Attach installer to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-and-release.outputs.tag }}
          files: installer-out/*.exe
          draft: false
          prerelease: false
